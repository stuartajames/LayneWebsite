name: Refresh Listings

on:
  schedule:
    - cron: '0 20 * * *' # 8am NZT (UTC+12)
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::660621845114:role/layne-github-actions
          aws-region: ap-southeast-2
          audience: sts.amazonaws.com

      - name: Snapshot listings to S3
        run: node scripts/fetch-listings.mjs
